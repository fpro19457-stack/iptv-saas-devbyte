<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV - Canales</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <!-- Sidebar Header -->
      <div class="sidebar-header">
        <div class="sidebar-left">
          <div class="logo-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
              <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
              <polyline points="17 2 12 7 7 2"></polyline>
            </svg>
          </div>
          <span class="app-title">IPTV DevByte</span>
        </div>
        <div class="sidebar-right">
          <div class="user-avatar" id="userAvatar">U</div>
          <button id="logoutBtn" class="logout-btn" title="Cerrar sesión">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>

      <!-- Category Filters -->
      <div class="filters-container" id="categoryFilters"></div>

      <!-- Channel List -->
      <div class="channel-list" id="channelList"></div>

      <!-- Mobile Bottom Panel Handle -->
      <div class="mobile-handle" id="sidebarHandle"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">
      <!-- Placeholder -->
      <div class="placeholder-message" id="placeholder">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
          <polyline points="17 2 12 7 7 2"></polyline>
        </svg>
        <h2>Seleccioná un canal</h2>
        <p>Usá las flechas del control o presioná Enter para reproducir</p>
      </div>

      <!-- Video Container -->
      <div class="video-container" id="videoContainer">
        <video id="videoPlayer" playsinline></video>

        <!-- Loading Spinner -->
        <div class="loading-spinner" id="loadingSpinner">
          <div class="spinner-ring"></div>
          <span class="spinner-text">Cargando...</span>
        </div>

        <!-- Error Screen -->
        <div class="error-screen" id="errorScreen">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5">
            <line x1="1" y1="1" x2="23" y2="23"></line>
            <path d="M9 9l.01.01M14.99 14.99l.01.01M9.01 14.99l-.01.01M14.99 9.01l-.01.01"></path>
            <path d="M5.64 5.64l12.72 12.72"></path>
            <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
            <line x1="2" y1="2" x2="22" y2="22" stroke="#ef4444" stroke-width="2"></line>
          </svg>
          <h3>Señal no disponible</h3>
          <p>Intentando con señal de respaldo...</p>
          <button class="btn-retry" id="retryBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Reintentar
          </button>
        </div>

        <!-- Channel Info Overlay (top) -->
        <div class="channel-info-overlay" id="channelOverlay">
          <div class="channel-info-left">
            <span class="channel-info-number" id="channelNumber"></span>
            <span class="channel-info-name" id="channelName"></span>
          </div>
          <div class="channel-info-right">
            <span class="channel-quality-badge" id="channelQuality"></span>
            <span class="live-indicator" id="liveIndicator">EN VIVO</span>
          </div>
        </div>

        <!-- Custom Controls -->
        <div class="player-controls" id="playerControls">
          <button class="control-play" id="controlPlay">
            <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg class="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          </button>
          <div class="controls-right">
            <span class="channel-time" id="channelTime"></span>
            <button class="control-fullscreen" id="controlFullscreen">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 3 21 3 21 9"></polyline>
                <polyline points="9 21 3 21 3 15"></polyline>
                <line x1="21" y1="3" x2="14" y2="10"></line>
                <line x1="3" y1="21" x2="10" y2="14"></line>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Number Display Overlay -->
    <div class="number-overlay" id="numberOverlay">
      <div class="number-circle">
        <span id="numberValue"></span>
      </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer"></div>
  </div>

  <script src="js/channels.js"></script>
</body>
</html>
