<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>IPTV - Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
          <polyline points="17 2 12 7 7 2"></polyline>
        </svg>
        <span>IPTV DevByte</span>
      </div>

      <div class="login-tabs">
        <button class="login-tab active" data-tab="credentials" tabindex="1">Usuario y clave</button>
        <button class="login-tab" data-tab="pairing" tabindex="2">Emparejar TV</button>
      </div>

      <form id="loginForm" class="login-form tab-content active" data-tab="credentials">
        <div class="input-group">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" id="username" placeholder="Usuario" autocomplete="username" tabindex="1">
        </div>

        <div class="input-group">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" tabindex="2">
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <button type="submit" class="btn-login" tabindex="3">
          <span class="btn-text">Ingresar</span>
          <span class="btn-loading" style="display: none;">
            <svg class="spinner" width="20" height="20" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-dashoffset="0">
                <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </span>
        </button>
      </form>

      <div id="pairingTab" class="login-form tab-content pairing-content" data-tab="pairing">
        <div id="pairingCodeDisplay" class="pairing-code-box">
          <div class="pairing-code-label">Código de emparejamiento</div>
          <div id="pairingCode" class="pairing-code">---</div>
          <div id="pairingExpiry" class="pairing-expiry">Expira en --:--</div>
        </div>

        <div id="pairingStatus" class="pairing-status">
          <span class="pairing-dots">Esperando aprobación<span class="dot1">.</span><span class="dot2">.</span><span class="dot3">.</span></span>
        </div>

        <div id="pairingError" class="error-message" style="display: none;"></div>

        <button id="regenerateBtn" class="btn-login" style="display: none;" tabindex="4">
          <span class="btn-text">Generar nuevo código</span>
        </button>
      </div>

      <div class="login-footer">
        <p>Compatible con Smart TV y navegadores</p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
